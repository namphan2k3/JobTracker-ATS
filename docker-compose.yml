services:
  mysql:
    image: mysql:8.0
    container_name: jobtracker-mysql
    environment:
      MYSQL_DATABASE: jobtracker
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    ports:                   
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-123456} || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
    networks:
      - jobtracker-net

  redis:
    image: redis:7.2
    container_name: jobtracker-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redispass}"]
    ports:                    
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redispass} ping || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
    networks:
      - jobtracker-net

  app:
    build:
      context: ./jobtracker-app
      dockerfile: Dockerfile
    container_name: jobtracker-app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobtracker-net
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DEV_DB_URL: ${DEV_DB_URL:-jdbc:mysql://mysql:3306/jobtracker}
      DEV_DB_USERNAME: root
      DEV_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      DEV_REDIS_HOST: redis
      DEV_REDIS_PORT: 6379
      DEV_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}

    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  jobtracker-net:
    driver: bridge

