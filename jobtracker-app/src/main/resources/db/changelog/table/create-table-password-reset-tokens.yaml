databaseChangeLog:
  - changeSet:
      id: create-table-password-reset-tokens
      author: namphan
      changes:
        - createTable:
            tableName: password_reset_tokens
            remarks: "Bảng token reset mật khẩu (forgot password)"
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: "UUID token"
              - column:
                  name: user_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                  remarks: "UUID user cần reset password"
              - column:
                  name: company_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                  remarks: "Multi-tenant key"
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
                  remarks: "Token (random string hoặc UUID)"
              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: "Thời gian hết hạn (thường 1 giờ)"
              - column:
                  name: used_at
                  type: timestamp
                  remarks: "Thời gian đã reset (null nếu chưa dùng)"
              - column:
                  name: sent_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: "Thời gian gửi email"
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: "Thời gian tạo"
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: "Thời gian cập nhật"
              - column:
                  name: deleted_at
                  type: timestamp
                  remarks: "Soft delete"
