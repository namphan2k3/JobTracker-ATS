databaseChangeLog:
  - changeSet:
      id: create-indexes-password-reset-tokens
      author: namphan
      changes:
        - createIndex:
            indexName: idx_password_reset_tokens_user_id
            tableName: password_reset_tokens
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_password_reset_tokens_company_id
            tableName: password_reset_tokens
            columns:
              - column:
                  name: company_id
        - createIndex:
            indexName: idx_password_reset_tokens_token
            tableName: password_reset_tokens
            columns:
              - column:
                  name: token
        - createIndex:
            indexName: idx_password_reset_tokens_expires_at
            tableName: password_reset_tokens
            columns:
              - column:
                  name: expires_at
        - createIndex:
            indexName: idx_password_reset_tokens_user_unused
            tableName: password_reset_tokens
            columns:
              - column:
                  name: user_id
              - column:
                  name: used_at
              - column:
                  name: expires_at
              - column:
                  name: deleted_at
