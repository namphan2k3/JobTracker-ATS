databaseChangeLog:
  - changeSet:
      id: create-indexes-email-verification-tokens
      author: namphan
      changes:
        - createIndex:
            indexName: idx_email_verification_tokens_user_id
            tableName: email_verification_tokens
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_email_verification_tokens_company_id
            tableName: email_verification_tokens
            columns:
              - column:
                  name: company_id
        - createIndex:
            indexName: idx_email_verification_tokens_token
            tableName: email_verification_tokens
            columns:
              - column:
                  name: token
        - createIndex:
            indexName: idx_email_verification_tokens_expires_at
            tableName: email_verification_tokens
            columns:
              - column:
                  name: expires_at
        - createIndex:
            indexName: idx_email_verification_tokens_user_unused
            tableName: email_verification_tokens
            columns:
              - column:
                  name: user_id
              - column:
                  name: used_at
              - column:
                  name: expires_at
              - column:
                  name: deleted_at
