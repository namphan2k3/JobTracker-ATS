databaseChangeLog:
  - changeSet:
      id: add-constraints-password-reset-tokens
      author: namphan
      changes:
        - addForeignKeyConstraint:
            baseTableName: password_reset_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_password_reset_tokens_user_id_users
        - addForeignKeyConstraint:
            baseTableName: password_reset_tokens
            baseColumnNames: company_id
            referencedTableName: companies
            referencedColumnNames: id
            onDelete: RESTRICT
            constraintName: fk_password_reset_tokens_company_id_companies
