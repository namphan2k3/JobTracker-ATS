server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/master/db.changelog-master.yaml

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

  messages:
    basename: i18n/messages
    encoding: UTF-8
    default-locale: en

auth:
  verification-token-expiry-hours: 24
  password-reset-token-expiry-hours: 1
  invite-token-expiry-days: 7

scheduler:
  plan-limit:
    cron: "0 0 * * * ?"
  notifications:
    deadline-reminder-cron: "0 0 9 * * ?"
    deadline-reminder-days: 3
    interview-reminder-cron: "0 */5 * * * ?"
    interview-reminder-minutes: 60

springdoc:
  default-flat-param-object: true
